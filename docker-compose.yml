services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: leetcanvas
      POSTGRES_USER: leetcanvas
      POSTGRES_PASSWORD: leetcanvas
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leetcanvas"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
