spring.application.name=submissions-service
server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5432/leetcanvas
spring.datasource.username=leetcanvas
spring.datasource.password=leetcanvas

# Tell Flyway to create/migrate only the submissions schema
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=submissions
spring.flyway.default-schema=submissions

# RabbitMQ connection
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=leetcanvas
spring.rabbitmq.password=leetcanvas
