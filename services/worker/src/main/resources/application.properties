spring.application.name=worker-service
server.port=8083

spring.datasource.url=jdbc:postgresql://localhost:5432/leetdoodle
spring.datasource.username=leetdoodle
spring.datasource.password=leetdoodle

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=leetdoodle
spring.rabbitmq.password=leetdoodle

# Docker socket URI. DefaultDockerClientConfig reads DOCKER_HOST from the
# environment, which can override the socket path set in code. Configuring it
# here pins the value and prevents the env var from silently taking over.
worker.docker.host=unix:///var/run/docker.sock

# --- gRPC Client ---
# Points to the leetcode-service gRPC server.
# "static://" means a fixed address (no service discovery) — fine for local dev.
grpc.client.leetcode-service.address=static://localhost:9090
grpc.client.leetcode-service.negotiation-type=plaintext

# Number of pre-warmed containers to keep ready per language
worker.pool.size=2
# Max seconds a single execution is allowed to run before we kill the container
worker.exec.timeout-seconds=10
