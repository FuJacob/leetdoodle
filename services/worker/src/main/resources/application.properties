spring.application.name=worker-service
server.port=8083

spring.datasource.url=jdbc:postgresql://localhost:5432/leetcanvas
spring.datasource.username=leetcanvas
spring.datasource.password=leetcanvas

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=leetcanvas
spring.rabbitmq.password=leetcanvas

# Number of pre-warmed containers to keep ready per language
worker.pool.size=2
# Max seconds a single execution is allowed to run before we kill the container
worker.exec.timeout-seconds=10
