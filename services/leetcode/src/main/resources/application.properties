spring.application.name=leetcode-service
server.port=8081

# --- DataSource ---
# HikariCP (bundled with starter-jdbc) manages a pool of reusable DB
# connections. Without a pool, every query opens a new TCP connection
# to Postgres — TLS handshake, auth, ~5-20ms overhead each time.
# The pool keeps connections warm. Default size is 10, plenty for dev.
spring.datasource.url=jdbc:postgresql://localhost:5432/leetcanvas
spring.datasource.username=leetcanvas
spring.datasource.password=leetcanvas

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- gRPC Server ---
# The worker calls this port to get test cases + eval metadata.
# Runs alongside the HTTP server (port 8081) — they don't conflict.
grpc.server.port=9090

# --- Seeder ---
# Supports Spring resource prefixes: file:path or classpath:path
# Official source of problem catalog/content (LeetCode API dump)
leetcode.seeder.official-questions-path=file:./data/seed/official-questions.json
# Eval metadata source (prompt, entry_point, test cases)
leetcode.seeder.eval-metadata-path=file:./data/seed/test-cases.jsonl
leetcode.seeder.enabled=true
