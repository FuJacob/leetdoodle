# =============================================================================
# Debezium Server — Postgres → RabbitMQ
#
# Debezium Server is a standalone process that tails the Postgres WAL
# (Write-Ahead Log) and forwards change events to a sink — in our case,
# RabbitMQ. No Kafka, no Kafka Connect, no extra broker needed.
#
# FLOW:
#   1. SubmissionService writes a row to outbox + submissions in ONE transaction
#   2. Postgres commits; the WAL record for the outbox INSERT is written
#   3. Debezium reads the WAL via the logical replication protocol
#   4. The Outbox Event Router SMT strips the CDC envelope down to just the payload
#   5. Debezium publishes to RabbitMQ exchange "eval" with routing key "eval"
#   6. eval.queue receives the message; worker deserialises and runs the eval
# =============================================================================

# --- Debezium Server sink: RabbitMQ -------------------------------------------
debezium.sink.type=rabbitmq
debezium.sink.rabbitmq.connection.host=rabbitmq
debezium.sink.rabbitmq.connection.port=5672
debezium.sink.rabbitmq.connection.username=leetdoodle
debezium.sink.rabbitmq.connection.password=leetdoodle

# The exchange Debezium publishes to. The Outbox Event Router SMT (below)
# unwraps the outbox payload, but the Rabbit sink still needs an explicit
# routing key. Without this, Debezium defaults to an empty routing key and
# messages won't match the "eval" binding. The exchange/queue topology must
# already exist (declared by submissions-service RabbitConfig).
debezium.sink.rabbitmq.exchange=eval
debezium.sink.rabbitmq.routingKey=eval

# --- Message format -----------------------------------------------------------
# Debezium Server defaults to Kafka Connect JsonConverter with schema metadata,
# which wraps messages as {"schema":...,"payload":...}. The worker expects the
# raw EvalJob JSON object, so disable schema envelopes and expand json payloads.
debezium.format.key.schemas.enable=false
debezium.format.value.schemas.enable=false

# --- Debezium source: Postgres ------------------------------------------------
debezium.source.connector.class=io.debezium.connector.postgresql.PostgresConnector
debezium.source.database.hostname=postgres
debezium.source.database.port=5432
debezium.source.database.user=leetdoodle
debezium.source.database.password=leetdoodle
debezium.source.database.dbname=leetdoodle
debezium.source.database.server.name=leetdoodle
debezium.source.plugin.name=pgoutput

# Only watch the outbox table in the submissions schema — no need to replicate
# the entire database. The table.include.list filter is applied before any
# events reach the SMT, keeping CPU and I/O minimal.
debezium.source.table.include.list=submissions.outbox

# --- Outbox Event Router SMT --------------------------------------------------
# SMT = Single Message Transform. Debezium runs a chain of transforms on every
# CDC event before forwarding it to the sink.
#
# The Outbox Event Router is a Debezium-bundled SMT designed exactly for this
# pattern. It does two things:
#   1. Strips the CDC envelope (before/after/op/ts_ms fields) and replaces the
#      message value with the content of the "payload" column (our JSON EvalJob).
#   2. Routes by event_type ("eval"), which is still useful for downstream
#      topic naming and envelope metadata.
#
# Without this SMT the worker would receive the full CDC document, which looks
# like {"before": null, "after": {...}, "op": "c", ...} — it would need to
# unwrap the "after.payload" field itself. The SMT handles that unwrapping.
debezium.source.transforms=outbox
debezium.source.transforms.outbox.type=io.debezium.transforms.outbox.EventRouter
debezium.source.transforms.outbox.table.field.event.id=id
debezium.source.transforms.outbox.table.field.event.key=aggregate_id
debezium.source.transforms.outbox.table.field.event.payload=payload
debezium.source.transforms.outbox.table.expand.json.payload=true
debezium.source.transforms.outbox.route.by.field=event_type
debezium.source.transforms.outbox.route.topic.replacement=eval

# --- Offset storage -----------------------------------------------------------
# Debezium tracks its position in the WAL using an "offset" — essentially the
# Postgres LSN (Log Sequence Number) of the last event it processed. Storing
# this to a file means Debezium resumes from the right place after a restart.
#
# WARNING: if debezium-data volume is lost, Debezium starts from the beginning
# of the replication slot and re-publishes all outbox rows. The worker must be
# idempotent (or we add a de-dup check) to handle that safely. For now, a fresh
# dev environment is fine — replication slots are cheap to recreate.
debezium.source.offset.storage=org.apache.kafka.connect.storage.FileOffsetBackingStore
debezium.source.offset.storage.file.filename=/debezium/data/offsets.dat
debezium.source.offset.flush.interval.ms=1000

# Replication slot name — Debezium creates this automatically in Postgres.
# A replication slot holds WAL segments until the consumer (Debezium) has read
# them, so Postgres knows what it can safely discard. Monitor pg_replication_slots
# in production — a stopped Debezium will cause WAL to accumulate indefinitely.
debezium.source.slot.name=debezium_submissions

# --- Misc ---------------------------------------------------------------------
# Emit only the "after" image for inserts (we only care about new outbox rows,
# not updates/deletes). INITIAL_ONLY would skip existing rows at startup;
# DEFAULT reads the full snapshot first which we don't need for an outbox.
debezium.source.snapshot.mode=no_data
debezium.source.topic.prefix=leetdoodle
