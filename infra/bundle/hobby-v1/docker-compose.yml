services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: leetdoodle
      POSTGRES_USER: leetdoodle
      POSTGRES_PASSWORD: leetdoodle
    command: >
      postgres
      -c wal_level=logical
      -c max_replication_slots=10
      -c max_wal_senders=10
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leetdoodle"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: leetdoodle
      RABBITMQ_DEFAULT_PASS: leetdoodle
    ports:
      - "15674:5672"
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  collab:
    image: leetdoodle/collab:hobby-amd64
    ports:
      - "18480:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  leetcode:
    image: leetdoodle/leetcode:hobby-amd64
    ports:
      - "18481:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/leetdoodle
      SPRING_DATASOURCE_USERNAME: leetdoodle
      SPRING_DATASOURCE_PASSWORD: leetdoodle
      GRPC_SERVER_PORT: 9090
      LEETCODE_SEEDER_OFFICIAL_QUESTIONS_PATH: file:/app/data/seed/official-questions.json
      LEETCODE_SEEDER_EVAL_METADATA_PATH: file:/app/data/seed/test-cases.jsonl
      LEETCODE_SEEDER_ENABLED: "true"
    volumes:
      - ./leetcode/seed:/app/data/seed:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  submissions:
    image: leetdoodle/submissions:hobby-amd64
    ports:
      - "18482:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/leetdoodle
      SPRING_DATASOURCE_USERNAME: leetdoodle
      SPRING_DATASOURCE_PASSWORD: leetdoodle
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: leetdoodle
      SPRING_RABBITMQ_PASSWORD: leetdoodle
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: leetdoodle/worker:hobby-amd64
    ports:
      - "18483:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/leetdoodle
      SPRING_DATASOURCE_USERNAME: leetdoodle
      SPRING_DATASOURCE_PASSWORD: leetdoodle
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: leetdoodle
      SPRING_RABBITMQ_PASSWORD: leetdoodle
      WORKER_DOCKER_HOST: unix:///var/run/docker.sock
      GRPC_CLIENT_LEETCODE_SERVICE_ADDRESS: static://leetcode:9090
      GRPC_CLIENT_LEETCODE_SERVICE_NEGOTIATION_TYPE: plaintext
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      leetcode:
        condition: service_started
    restart: unless-stopped

  debezium:
    image: debezium/server:2.7.3.Final
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      submissions:
        condition: service_started
    volumes:
      - ./debezium/conf:/debezium/conf:ro
      - debezium-data:/debezium/data
    restart: unless-stopped

volumes:
  postgres-data:
  debezium-data:
